name: Auto Daily SEO Generation

on:
  schedule:
    # Run at 00:00 UTC every day (8:00 AM Beijing time)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab

jobs:
  generate-seo:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Run SEO Script
        run: node scripts/auto-daily-seo.js
        
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog/*/seo-batch/*.md
          
          # Check if there are any changes to commit
          if git diff --staged --quiet; then
            echo "No new articles generated."
          else
            git commit -m "docs: auto-generate daily SEO articles [skip ci]"
            git push origin master
          fi
